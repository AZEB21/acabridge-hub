services:
  - type: web
    name: acabridge-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_countries_tracks"
    startCommand: "python manage.py migrate && python manage.py create_superuser_env && gunicorn acabridge.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "acabridge-hub-1.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000 http://127.0.0.1:3000 http://localhost:3001 http://127.0.0.1:3001 https://acabridge-hub-2.onrender.com"
